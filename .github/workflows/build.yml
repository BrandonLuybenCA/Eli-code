name: Build IPA & Temp Download Tunnel

on:
  workflow_dispatch:   # manual trigger only

jobs:
  build-and-serve:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        run: sudo xcode-select -switch /Applications/Xcode_15.4.app

      - name: Inject HF Token
        run: |
          sed -i '' "s/YOUR_HF_TOKEN_HERE/${{ secrets.HF_TOKEN }}/g" ViewController.swift

      - name: Build unsigned IPA (fixed)
        run: |
          # Clean previous builds
          xcodebuild clean -project Eli.xcodeproj -scheme Eli || true

          # Archive the app
          xcodebuild -project Eli.xcodeproj \
            -scheme Eli \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -archivePath build/Eli.xcarchive \
            archive

          # Path to the .app bundle inside the archive
          APP_PATH="build/Eli.xcarchive/Products/Applications/Eli.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "❌ .app bundle not found at expected location"
            exit 1
          fi

          # Force copy Info.plist from repo root into the .app if missing
          if [ ! -f "$APP_PATH/Info.plist" ]; then
            echo "⚠️ Info.plist missing in .app, copying from repo root..."
            if [ -f "Info.plist" ]; then
              cp Info.plist "$APP_PATH/Info.plist"
            else
              echo "❌ No Info.plist found in repository root"
              exit 1
            fi
          fi

          # Validate Info.plist syntax
          plutil -lint "$APP_PATH/Info.plist" || {
            echo "❌ Invalid Info.plist format"
            exit 1
          }

          # Create Payload folder and copy .app into it
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/

          # Final verification
          if [ ! -f "build/Payload/Eli.app/Info.plist" ]; then
            echo "❌ Failed to place Info.plist inside Payload/Eli.app/"
            exit 1
          fi

          # Create IPA (standard ZIP with Payload folder at root)
          cd build
          zip -9 -r Eli.ipa Payload/
          cd ..

          # Verify IPA structure
          echo "Verifying IPA contents..."
          unzip -l build/Eli.ipa | grep "Payload/Eli.app/Info.plist" || {
            echo "❌ IPA validation failed: Info.plist not found in the IPA"
            exit 1
          }
          echo "✅ IPA is valid and contains Info.plist"

      - name: Create server directory and copy IPA
        run: |
          mkdir -p serve
          cp build/Eli.ipa serve/

      - name: Create Node.js server script
        run: |
          cat > serve/server.js << 'EOF'
          const express = require('express');
          const path = require('path');
          const app = express();
          const PORT = 3000;
          app.use(express.static('.'));
          app.get('/', (req, res) => {
            res.send(`
              <!DOCTYPE html>
              <html>
              <head><meta name="viewport" content="width=device-width, initial-scale=1.0"></head>
              <body style="background:black; color:white; text-align:center; padding:50px; font-family:system-ui;">
                <h1>🤖 Eli IPA Download</h1>
                <a href="/Eli.ipa" style="background:#A78BFA; color:white; padding:15px 30px; border-radius:30px; text-decoration:none; display:inline-block;">
                  📲 Download Eli.ipa
                </a>
                <p style="margin-top:30px; font-size:12px;">Tunnel active for ~20 minutes</p>
              </body>
              </html>
            `);
          });
          app.listen(PORT, () => console.log(`Server running on port ${PORT}`));
          EOF

      - name: Install Node dependencies
        run: |
          cd serve
          npm init -y
          npm install express

      - name: Start Node server in background
        run: |
          cd serve
          node server.js &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          sleep 2

      - name: Install cloudflared
        run: brew install cloudflared

      - name: Start Cloudflare tunnel
        run: |
          cloudflared tunnel --url http://localhost:3000 --logfile cloudflared.log &
          echo "TUNNEL_PID=$!" >> $GITHUB_ENV
          sleep 10
          URL=$(grep -o 'https://[a-z0-9.-]*\.trycloudflare\.com' cloudflared.log | head -1)
          echo "TUNNEL_URL=$URL" >> $GITHUB_ENV
          echo "✅ Tunnel URL: $URL"

      - name: Display download link
        run: |
          echo "==========================================="
          echo "📲 DOWNLOAD YOUR IPA HERE:"
          echo "${{ env.TUNNEL_URL }}/Eli.ipa"
          echo "==========================================="
          echo "This link is valid for approximately 20 minutes."
          echo "After downloading, use ipa-sign.com or Portal to sign."

      - name: Keep runner alive for 20 minutes
        run: sleep 1200
