name: Build Eli IPA and Upload to file.io

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - uses: actions/checkout@v4

    - name: Set up Xcode
      run: sudo xcode-select -switch /Applications/Xcode_15.4.app

    - name: Inject HF Token
      run: |
        sed -i '' "s/YOUR_HF_TOKEN_HERE/${{ secrets.HF_TOKEN }}/g" ViewController.swift

    - name: Build unsigned IPA
      run: |
        xcodebuild -project Eli.xcodeproj \
          -scheme Eli \
          -sdk iphoneos \
          -configuration Release \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          -archivePath build/Eli.xcarchive \
          archive
        
        mkdir -p build/Payload
        cp -r build/Eli.xcarchive/Products/Applications/Eli.app build/Payload/
        cd build && zip -r Eli.ipa Payload/ && cd ..

    - name: Upload IPA to file.io
      id: upload
      run: |
        response=$(curl -s -F "file=@build/Eli.ipa" https://file.io)
        url=$(echo "$response" | grep -o '"link":"[^"]*"' | cut -d'"' -f4)
        echo "FILEIO_URL=$url" >> $GITHUB_ENV
        echo "$url" > fileio_url.txt
        echo "Upload successful: $url"

    - name: Display Download URL
      run: |
        echo "✅ IPA uploaded to file.io"
        echo "Direct download link: ${{ env.FILEIO_URL }}"
        echo "Note: This link works only once. After downloading, you'll need to re-run the workflow for a new link."

    - name: Save URL as artifact
      uses: actions/upload-artifact@v4
      with:
        name: download-link.txt
        path: fileio_url.txt
        retention-days: 1

    - name: Backup IPA as artifact
      uses: actions/upload-artifact@v4
      with:
        name: Eli-Unsigned.ipa
        path: build/Eli.ipa
        retention-days: 1
