name: Build Eli IPA and Upload to oshi.at

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - uses: actions/checkout@v4

    - name: Set up Xcode
      run: sudo xcode-select -switch /Applications/Xcode_15.4.app

    - name: Inject HF Token
      run: |
        sed -i '' "s/YOUR_HF_TOKEN_HERE/${{ secrets.HF_TOKEN }}/g" ViewController.swift

    - name: Build unsigned IPA
      run: |
        xcodebuild -project Eli.xcodeproj \
          -scheme Eli \
          -sdk iphoneos \
          -configuration Release \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          -archivePath build/Eli.xcarchive \
          archive
        
        mkdir -p build/Payload
        cp -r build/Eli.xcarchive/Products/Applications/Eli.app build/Payload/
        cd build && zip -r Eli.ipa Payload/ && cd ..

    - name: Upload IPA to oshi.at
      id: upload
      run: |
        # Upload file, get direct link
        response=$(curl -s -F "file=@build/Eli.ipa" https://oshi.at)
        # Extract the download URL
        url=$(echo "$response" | grep -o 'https://[^ ]*' | head -1)
        echo "OSHI_URL=$url" >> $GITHUB_ENV
        echo "$url" > oshi_url.txt
        echo "Upload successful: $url"

    - name: Display Download URL
      run: |
        echo "✅ IPA uploaded to oshi.at"
        echo "Direct download link: ${{ env.OSHI_URL }}"
        echo ""
        echo "Use this URL in FileGrabber.net or your browser"

    - name: Save URL as artifact (tiny, fast)
      uses: actions/upload-artifact@v4
      with:
        name: download-link.txt
        path: oshi_url.txt
        retention-days: 1

    - name: Backup IPA as artifact (optional)
      uses: actions/upload-artifact@v4
      with:
        name: Eli-Unsigned.ipa
        path: build/Eli.ipa
        retention-days: 1
