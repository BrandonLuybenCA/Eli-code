name: Build Eli IPA (Unsigned)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - uses: actions/checkout@v4

    - name: Set up Xcode
      run: sudo xcode-select -switch /Applications/Xcode_15.4.app

    - name: Inject HF Token
      run: |
        sed -i '' "s/YOUR_HF_TOKEN_HERE/${{ secrets.HF_TOKEN }}/g" ViewController.swift

    - name: Create Firebase Config from Secret (if using)
      run: |
        if [ -n "${{ secrets.GOOGLE_SERVICE_BASE64 }}" ]; then
          echo '${{ secrets.GOOGLE_SERVICE_BASE64 }}' | base64 --decode > GoogleService-Info.plist
        fi

    - name: Build unsigned IPA
      run: |
        xcodebuild -project Eli.xcodeproj \
          -scheme Eli \
          -sdk iphoneos \
          -configuration Release \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          -archivePath build/Eli.xcarchive \
          archive
        
        mkdir -p build/Payload
        cp -r build/Eli.xcarchive/Products/Applications/Eli.app build/Payload/
        cd build && zip -r Eli.ipa Payload/ && cd ..

    - name: Upload IPA to Catbox.moe
      id: catbox
      run: |
        # Catbox API upload
        response=$(curl -s -F "reqtype=fileupload" -F "fileToUpload=@build/Eli.ipa" https://catbox.moe/user/api.php)
        echo "CATBOX_URL=$response" >> $GITHUB_ENV
        echo "Uploaded to: $response"
        
        # Save URL to a file for later steps (optional)
        echo "$response" > catbox_url.txt

    - name: Display Catbox URL
      run: |
        echo "✅ IPA uploaded to Catbox:"
        echo "${{ env.CATBOX_URL }}"
        echo ""
        echo "You can now use FileGrabber.net with this URL:"
        echo "${{ env.CATBOX_URL }}"

    - name: Upload IPA as artifact (fallback)
      uses: actions/upload-artifact@v4
      with:
        name: Eli-Unsigned.ipa
        path: build/Eli.ipa
        retention-days: 1   # short retention because you'll use Catbox

    - name: Save Catbox URL as artifact
      uses: actions/upload-artifact@v4
      with:
        name: catbox-url.txt
        path: catbox_url.txt
        retention-days: 1
